{{- if .Values.configMap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "demo-helm.fullname" . }}
  namespace: {{ include "demo-helm.namespace" . }}
  labels:
    {{- include "demo-helm.labels" . | nindent 4 }}
{{- with .Values.configMap.data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}

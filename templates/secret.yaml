{{- if .Values.secret.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demo-helm.fullname" . }}
  namespace: {{ include "demo-helm.namespace" . }}
  labels:
    {{- include "demo-helm.labels" . | nindent 4 }}
type: {{ .Values.secret.type | default "Opaque" }}
{{- with .Values.secret.data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.secret.stringData }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
